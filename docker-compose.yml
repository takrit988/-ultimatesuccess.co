services:
  db:
    image: postgres:15-alpine
    container_name: ultimatesuccess-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ultimatesuccess
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ultimatesuccess"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
